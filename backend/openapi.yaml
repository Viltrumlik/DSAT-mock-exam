  /api/exams/admin/tests/{test_pk}/modules/{module_pk}/questions/bulk-reorder/:
    post:
      operationId: exams_admin_tests_modules_questions_bulk_reorder_create
      description: |-
        Atomically reorder all questions in a module in a single round-trip.

        Request body: { "ordered_ids": [id1, id2, id3, ...] }

        Validation:
        - ``ordered_ids`` must be a non-empty list.
        - Every ID must belong to this module (no cross-module moves).
        - The list must be complete — partial reorders are rejected to prevent
          silent ordering corruption.
        - Duplicate IDs are rejected.

        Concurrency: holds a SELECT FOR UPDATE lock on the Module row for the
        full duration, using the same two-phase dense-reindex path as the
        per-question reorder action.
      parameters:
      - in: path
        name: module_pk
        schema:
          type: integer
        required: true
      - in: path
        name: test_pk
        schema:
          type: integer
        required: true
      tags:
      - exams
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminQuestion'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminQuestion'
          application/json:
            schema:
              $ref: '#/components/schemas/AdminQuestion'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminQuestion'
          description: ''
