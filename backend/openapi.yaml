    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          nullable: true
          description: NULL means the user has not supplied an address yet (a Telegram
            signup) or lost it to someone who proved control of it. Those accounts
            sign in with their username, which is why releasing one is refused when
            it has none.
          maxLength: 254
        username:
          type: string
          nullable: true
          maxLength: 150
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        phone_number:
          type: string
          nullable: true
          description: E.164-style or local digits; optional, unique when set (e.g.
            for Telegram users).
          maxLength: 20
        role:
          type: string
        subject:
          type: string
          nullable: true
        class_teacher_eligible:
          type: string
          readOnly: true
        bulk_assign_profile:
          type: string
          readOnly: true
        is_admin:
          type: boolean
          writeOnly: true
        is_active:
          type: boolean
          readOnly: true
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        is_frozen:
          type: boolean
        date_joined:
          type: string
          format: date-time
          readOnly: true
        last_login:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        email_verified:
          type: boolean
          readOnly: true
          description: 'True only once the user proved control of this address by
            entering a mailed code. Never backfilled: signup provenance is not recorded,
            so for existing rows there is no way to tell whether the address was ever
            real.'
        email_verified_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        email_released_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        previous_email:
          type: string
          format: email
          readOnly: true
          nullable: true
        attempt_count:
          type: integer
          readOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - attempt_count
