openapi: 3.0.3
info:
  title: MasterSAT LMS API
  version: 1.0.0
paths:
  /api/access/grant/:
    post:
      operationId: access_grant_create
      description: |-
        POST /api/access/grant/
        Body: { "userId": <int>, "subject": "math"|"english", "classroomId": <int|null> }
      tags:
      - access
      responses:
        '200':
          description: No response body
  /api/access/grants/:
    get:
      operationId: access_grants_list
      description: GET /api/access/grants/ — search/filter grants for the admin console.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - access
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResourceAccessGrantList'
          description: ''
  /api/access/grants/{grant_id}/events/:
    get:
      operationId: access_grants_events_list
      description: GET /api/access/grants/<id>/events/ — immutable audit trail for
        one grant.
      parameters:
      - in: path
        name: grant_id
        schema:
          type: integer
        required: true
      tags:
      - access
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccessGrantEvent'
          description: ''
  /api/access/grants/{grant_id}/extend/:
    post:
      operationId: access_grants_extend_create
      description: 'POST /api/access/grants/<id>/extend/ — body: {expires_at: iso|null}'
      parameters:
      - in: path
        name: grant_id
        schema:
          type: integer
        required: true
      tags:
      - access
      responses:
        '200':
          description: No response body
  /api/access/grants/{grant_id}/revoke/:
    post:
      operationId: access_grants_revoke_create
      description: POST /api/access/grants/<id>/revoke/
      parameters:
      - in: path
        name: grant_id
        schema:
          type: integer
        required: true
      tags:
      - access
      responses:
        '200':
          description: No response body
  /api/access/grants/classroom/:
    post:
      operationId: access_grants_classroom_create
      description: POST /api/access/grants/classroom/ — transactional resource grant
        to a whole class.
      tags:
      - access
      responses:
        '200':
          description: No response body
  /api/access/grants/resource/:
    post:
      operationId: access_grants_resource_create
      description: POST /api/access/grants/resource/ — grant a RESOURCE to one or
        many users.
      tags:
      - access
      responses:
        '200':
          description: No response body
  /api/access/grants/subject/:
    post:
      operationId: access_grants_subject_create
      description: POST /api/access/grants/subject/ — grant a SUBJECT to one or many
        users.
      tags:
      - access
      responses:
        '200':
          description: No response body
  /api/access/resource-types/:
    get:
      operationId: access_resource_types_retrieve
      description: GET /api/access/resource-types/ — registry keys for the picker
        dropdown.
      tags:
      - access
      responses:
        '200':
          description: No response body
  /api/access/resources/:
    get:
      operationId: access_resources_retrieve
      description: GET /api/access/resources/?type=<rt>&q=<text>&limit=30 — resource
        picker.
      tags:
      - access
      responses:
        '200':
          description: No response body
  /api/assessments/admin/attempts/{attempt_id}/:
    get:
      operationId: assessments_admin_attempts_retrieve
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/attempts/{attempt_id}/force-grade/:
    post:
      operationId: assessments_admin_attempts_force_grade_create
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/attempts/{attempt_id}/requeue/:
    post:
      operationId: assessments_admin_attempts_requeue_create
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/attempts/failed/:
    get:
      operationId: assessments_admin_attempts_failed_retrieve
      description: |-
        GET /assessments/admin/attempts/failed/

        List AssessmentAttempt rows that are in a failed/stuck state, newest first.

        An attempt is considered "stuck" if:
          - grading_status is "failed" (all automatic retries exhausted), OR
          - status is "submitted" AND submitted_at is more than 30 minutes ago
            (grading job appears to have been lost)

        Returns enough context for the operator to triage and retry without
        needing to open Django admin.

        Query params:
            limit  — default 50, max 200
            offset — default 0
      summary: List failed/stuck scoring attempts
      tags:
      - assessments
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/assessments/admin/builder/telemetry/:
    post:
      operationId: assessments_admin_builder_telemetry_create
      description: |-
        Minimal telemetry ingestion endpoint for questions-console builder recovery events.
        Best-effort counters only (Prometheus-exposed via assessments homework metrics endpoint).
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/governance-events/:
    get:
      operationId: assessments_admin_governance_events_retrieve
      description: |-
        GET /assessments/admin/governance-events/

        Queryable audit log for operators. Supports filtering by entity_type,
        event_type, actor_email, set_id (payload filter), and date range.
        Returns newest-first with cursor-style limit/offset pagination.

        Operators use this instead of Django admin for routine audit review.
        Never exposes payload fields that contain correct_answer data.

        Query params:
            event_type     — filter by event type (e.g. "publish", "fallback_path_used")
            entity_type    — filter by entity type (e.g. "AssessmentSetVersion")
            actor_email    — filter by actor
            since          — ISO datetime, show events after this timestamp
            until          — ISO datetime, show events before this timestamp
            limit          — default 50, max 200
            offset         — default 0
      summary: Query governance audit log
      tags:
      - assessments
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/assessments/admin/grading/metrics/:
    get:
      operationId: assessments_admin_grading_metrics_retrieve
      description: |-
        DB-derived grading metrics (broker-agnostic):
        - "queue size" approximated by pending submitted attempts
        - latency measured from submitted_at -> result.graded_at
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/grading/metrics/prometheus/:
    get:
      operationId: assessments_admin_grading_metrics_prometheus_retrieve
      description: |-
        Prometheus scrape endpoint for grading/worker gauges.
        Keep it dependency-free (mirrors realtime.prometheus pattern).
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/homework/metrics/prometheus/:
    get:
      operationId: assessments_admin_homework_metrics_prometheus_retrieve
      description: |-
        Prometheus scrape endpoint for homework integrity counters.
        Keep it dependency-free (mirrors other prometheus endpoints).
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/question-bank/select/:
    get:
      operationId: assessments_admin_question_bank_select_retrieve
      description: |-
        M4 — list APPROVED Question Bank questions for the builder's
        'Select From Question Bank' picker. Only status=APPROVED is ever returned;
        TRIAGE/IMPORTED/REJECTED/ARCHIVED questions are never selectable.
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/question-bank/taxonomy/:
    get:
      operationId: assessments_admin_question_bank_taxonomy_retrieve
      description: |-
        M4 — domains & skills actually used by APPROVED bank questions, for the builder
        picker's filter dropdowns.

        Lives here (not in questionbank's own API) because the questionbank taxonomy
        endpoint is gated by CanManageQuestions (global staff only) and would 403 for
        teachers — who CAN author assessments and therefore use the picker.
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/questions/{id}/:
    patch:
      operationId: assessments_admin_questions_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
    delete:
      operationId: assessments_admin_questions_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '204':
          description: No response body
  /api/assessments/admin/sets/:
    get:
      operationId: assessments_admin_sets_retrieve
      tags:
      - assessments
      responses:
        '200':
          description: No response body
    post:
      operationId: assessments_admin_sets_create
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/sets/{id}/:
    get:
      operationId: assessments_admin_sets_retrieve_2
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
    patch:
      operationId: assessments_admin_sets_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
    delete:
      operationId: assessments_admin_sets_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '204':
          description: No response body
  /api/assessments/admin/sets/{id}/publish/:
    post:
      operationId: assessments_admin_sets_publish_create
      description: |-
        POST /assessments/admin/sets/{pk}/publish/

        Transition an AssessmentSet from DRAFT → PUBLISHED state by building an
        immutable AssessmentSetVersion snapshot.

        GOVERNANCE:
          - Enforces all publish preconditions (INV-001 through INV-003 from PublishService).
          - Idempotent: re-publishing identical content returns existing version (HTTP 200).
          - Creating a new version returns HTTP 201.
          - Concurrency-safe via select_for_update() inside publish_assessment_set().

        FRONTEND INTEGRATION:
          Currently the publish page calls PATCH is_active=true (legacy toggle).
          Sprint 5: swap publishSet() in builder/sets/[id]/publish/page.tsx to call this endpoint.
      summary: Publish assessment set (create immutable snapshot)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminPublishResponse'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminPublishResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
  /api/assessments/admin/sets/{id}/status/:
    post:
      operationId: assessments_admin_sets_status_create
      description: |-
        POST /assessments/admin/sets/{pk}/status/   body: {"status": "<target>"}

        Move a set through the review lifecycle draft → needs_review → approved.

          - submit for review (→ needs_review):  any author of the set.
          - send back        (→ draft):          any author or an approver.
          - re-open          (approved → needs_review): any author or an approver.
          - approve          (→ approved):       APPROVER ONLY (admin/super_admin). The
                              approval ALSO publishes an immutable version so an approved
                              set always has a snapshot to pin homeworks to; if the set
                              fails publish validation the status does NOT change and the
                              blocking findings are returned.

        Every transition emits a GovernanceEvent (INV-GE03).
      summary: Transition an assessment set's review status
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentSetAdmin'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
  /api/assessments/admin/sets/{id}/validate-publish/:
    get:
      operationId: assessments_admin_sets_validate_publish_retrieve
      description: |-
        GET /assessments/admin/sets/{pk}/validate-publish/

        Dry-run publish validation — returns the full validation report without
        creating a version or changing any state.

        Used by the builder pre-publish checklist page to surface blocking and
        warning findings before the user commits to publishing.

        Response shape:
            {
                "is_publishable": bool,
                "blocking_count": int,
                "warning_count": int,
                "findings": [
                    {"severity": "blocking"|"warning", "code": str, "message": str,
                     "question_id": int|null, "context": dict},
                    ...
                ]
            }
      summary: Dry-run publish validation (no state change)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
  /api/assessments/admin/sets/{id}/versions/:
    get:
      operationId: assessments_admin_sets_versions_list
      description: |-
        GET /assessments/admin/sets/{pk}/versions/

        List all published versions for an AssessmentSet, newest first.
        Used by the builder version history panel.
      summary: List published versions for a set
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssessmentSetVersion'
          description: ''
  /api/assessments/admin/sets/{set_pk}/questions/:
    post:
      operationId: assessments_admin_sets_questions_create
      parameters:
      - in: path
        name: set_pk
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/sets/{set_pk}/questions/from-bank/:
    post:
      operationId: assessments_admin_sets_questions_from_bank_create
      description: M4 — create an AssessmentQuestion sourced from an APPROVED bank
        question.
      parameters:
      - in: path
        name: set_pk
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/sets/{set_pk}/questions/reorder/:
    post:
      operationId: assessments_admin_sets_questions_reorder_create
      description: |-
        POST /assessments/admin/sets/{set_pk}/questions/reorder/  {"ordered_ids": [...]}

        Atomically persist a full question ordering for a set. The whole set is
        reindexed to a dense, unique ``0..n-1`` under a set row-lock via a two-phase
        temp band — safe under the ``UNIQUE(assessment_set, order)`` constraint.
        Replaces the builder's old N-PATCH drag loop (which left duplicate/gapped
        orders if a request failed midway). Ids not listed are appended in canonical
        order; unknown ids are ignored.
      parameters:
      - in: path
        name: set_pk
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/attempts/{attempt_id}/bundle/:
    get:
      operationId: assessments_attempts_bundle_retrieve
      description: |-
        Student-facing attempt bootstrap: return attempt + sanitized question list
        (no correct answers), in the canonical builder order — identical for every
        student on the assignment.
      summary: Attempt bundle (attempt + set + questions)
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentAttemptBundleResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
  /api/assessments/attempts/{attempt_id}/feedback/:
    get:
      operationId: assessments_attempts_feedback_retrieve
      description: |-
        Instructional feedback from a teacher on a student's assessment attempt.

        GET  — returns existing feedback (or null body) for the attempt.
               Accessible by the attempt's student (post-submission) or the
               classroom teacher/admin.

        POST — upserts (creates or replaces) the feedback body.
               Only the classroom teacher or a staff admin may write.

        The record is intentionally one-per-attempt (not a thread) so teachers
        can refine their note without creating noise.  Students see the latest
        version in the pedagogical review page.
      summary: Get teacher feedback for attempt
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
    post:
      operationId: assessments_attempts_feedback_create
      description: |-
        Instructional feedback from a teacher on a student's assessment attempt.

        GET  — returns existing feedback (or null body) for the attempt.
               Accessible by the attempt's student (post-submission) or the
               classroom teacher/admin.

        POST — upserts (creates or replaces) the feedback body.
               Only the classroom teacher or a staff admin may write.

        The record is intentionally one-per-attempt (not a thread) so teachers
        can refine their note without creating noise.  Students see the latest
        version in the pedagogical review page.
      summary: Upsert teacher feedback for attempt
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
    delete:
      operationId: assessments_attempts_feedback_destroy
      description: |-
        Instructional feedback from a teacher on a student's assessment attempt.

        GET  — returns existing feedback (or null body) for the attempt.
               Accessible by the attempt's student (post-submission) or the
               classroom teacher/admin.

        POST — upserts (creates or replaces) the feedback body.
               Only the classroom teacher or a staff admin may write.

        The record is intentionally one-per-attempt (not a thread) so teachers
        can refine their note without creating noise.  Students see the latest
        version in the pedagogical review page.
      summary: Delete teacher feedback for attempt
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '204':
          description: No response body
  /api/assessments/attempts/{attempt_id}/review/:
    get:
      operationId: assessments_attempts_review_retrieve
      description: |-
        Post-submission pedagogical review for a student's assessment attempt.

        Only accessible after the attempt has been submitted or graded — the
        instructional moment where students learn from their work.

        Returns questions WITH correct_answer, explanation, and the student's
        own answer + correctness, framed for learning (not SAT benchmarking).

        Response shape:
            meta      — classroom_name, assignment_title, set_title, set_category,
                        due_at, question_count
            result    — score_points, max_points, percent, correct_count, total_questions
                        (null when grading is still pending)
            questions — ordered list of:
                        { id, order, prompt, question_prompt, question_type,
                          choices, points, correct_answer, explanation,
                          student_answer, is_correct, points_awarded }
      summary: Pedagogical review bundle (post-submission, with answers)
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
  /api/assessments/attempts/abandon/:
    post:
      operationId: assessments_attempts_abandon_create
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/attempts/answer/:
    post:
      operationId: assessments_attempts_answer_create
      summary: Save answer for one question
      tags:
      - assessments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveAnswer'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SaveAnswer'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SaveAnswer'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveAnswerStored'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveAnswerStaleWrite'
          description: ''
        '410':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
  /api/assessments/attempts/pause/:
    post:
      operationId: assessments_attempts_pause_create
      description: |-
        Freeze an in-progress attempt (save-and-exit / auto-pause on tab-leave).

        Stamps ``paused_at`` so the elapsed time-on-task counter freezes; the attempt
        stays IN_PROGRESS and fully resumable. Idempotent — pausing an already-paused
        attempt keeps the original pause start. Optionally records the last-viewed
        question index so resume lands in place. Answers are autosaved separately;
        this endpoint only manages pause state + cursor.
      summary: Pause attempt (save and exit / auto-pause)
      tags:
      - assessments
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentAttempt'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
  /api/assessments/attempts/resume/:
    post:
      operationId: assessments_attempts_resume_create
      description: |-
        Un-freeze a paused attempt. Banks the pause window into ``paused_seconds``
        and clears ``paused_at`` so the elapsed counter continues from where it froze
        (no jump). Idempotent for a running attempt.
      summary: Resume a paused attempt
      tags:
      - assessments
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentAttempt'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
  /api/assessments/attempts/start/:
    post:
      operationId: assessments_attempts_start_create
      summary: Start or resume attempt
      tags:
      - assessments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartAttempt'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StartAttempt'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StartAttempt'
