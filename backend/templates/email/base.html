{% comment %}
Shell for every message the platform sends.

Deliberately table-free, inline-styled and single-column: Gmail, Outlook and the
Uzbek webmail clients students actually use all strip <style> blocks, and a layout
that relies on them collapses to unstyled text.
{% endcomment %}<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block subject %}MasterSAT{% endblock %}</title>
  </head>
  <body style="margin:0;padding:0;background:#f4f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
    <div style="max-width:520px;margin:0 auto;padding:32px 20px;">

      <div style="font-size:20px;font-weight:800;color:#1f2937;letter-spacing:-0.01em;padding-bottom:20px;">
        MasterSAT
      </div>

      <div style="background:#ffffff;border:1px solid #e5e7eb;border-radius:16px;padding:28px 24px;">
        {% block content %}{% endblock %}
      </div>

      <div style="padding-top:20px;font-size:12px;line-height:1.6;color:#9ca3af;">
        {% block footer %}
          This message was sent automatically — please do not reply to it.
        {% endblock %}
      </div>

    </div>
  </body>
</html>
